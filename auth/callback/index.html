<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomeFlow Auth Redirect</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fb;
      color: #1f2937;
    }
    .card {
      max-width: 560px;
      margin: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
    }
    h1 { margin-top: 0; font-size: 1.1rem; }
    p { line-height: 1.45; }
    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
    }
    code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Returning to HomeFlow...</h1>
    <p>If the app does not open automatically, tap the button below.</p>
    <a id="openApp" href="#">Open HomeFlow</a>
    <p id="debug" style="font-size: 0.9rem; color: #6b7280;"></p>
  </main>

  <script>
    (function () {
      var appSchemeBase = 'art.mladenstojanovic.homeflow://login-callback';

      // Supabase usually returns tokens in URL fragment (#...), but keep query too.
      var fragment = window.location.hash ? window.location.hash.substring(1) : '';
      var query = window.location.search ? window.location.search.substring(1) : '';

      var payload = fragment || query;
      var target = appSchemeBase + (payload ? '?' + payload : '');

      var openBtn = document.getElementById('openApp');
      var debug = document.getElementById('debug');

      openBtn.href = target;
      debug.textContent = 'Redirect target: ' + target;

      window.location.replace(target);

      // Keep a fallback for browsers that block auto-open.
      setTimeout(function () {
        openBtn.focus();
      }, 500);
    })();
  </script>
</body>
</html>
